project_metadata:
  name: "Oregon Trail"
  remote_repository: "https://github.com/mnaatjes/oregon-trail-clone.git"
  description: "A text-based adventure game where players navigate the challenges of the Oregon Trail."
  version: "0.1.1"
  author: "Michael Naatjes"
  updated_at: 2026-04-14

project_wide_directives:
  - "Circular Imports Prohibited: Hierarchy must be strictly unidirectional (e.g., Character -> Health)."
  - "Zero-Dependency Principle: Leaf packages (like 'health') must not depend on sibling packages."
  - "Ubiquitous Nomenclature: Logic and services must be named after player intent (e.g., 'fording_river' vs 'update_location')."
  - "At-a-Glance Orientation: A non-technical expert must be able to locate a game feature in the tree within 3 seconds."

structural_patterns:
  implementation: "Model-View-Controller (MVC)"
  attributes:
    - "Will act as a Screaming MVC."
    - "Orthogonal Evolution: Changes in UI (View) must never necessitate changes in Domain (Model)."
    - "Pillar Encapsulation: Domain, UI, and Engine must remain physically and logically separate."

organizational_patterns:
  implementation: "Screaming Architecture"
  src_directory_map: 
    domain:
      related_to_MVC:
        - "Role: Acts as the Model in MVC."
        - "Hierarchy: Business-rule/Entity name is the top-level parent (e.g., domain/health/, domain/animal/)."
        - "Contents: Contains Data (models, value objects, blueprints), Business Rules (logic), and Orchestration (services)."
        - "API Surface: Use __init__.py to flatten the internal structure and lift functions to the top level (e.g., character.apply_aging())."
      internal_package_blueprint:
        models: "Immutable state containers and Entities (The 'What')."
        logic: "Pure domain functions and rules (The 'How' / Use-Cases)."
        services: "Orchestration for how model-entities perform tasks."
        exceptions: "Domain-specific errors (e.g., StarvationError)."
        constants: "Fixed scalars and enums specific to the component."
      components_within_domain:
        - "Registries manage Blueprints (Global Templates)."
        #- "Services manage Entities (Stateful Actors)."
        - "ServiceProviders facilitate the Register -> Boot lifecycle via the ServiceContainer."
        - "Internal Consistency: Every domain package maintains a mirrored internal file structure."
    engine:
      - "Role: Fulfills role as the Controller in MVC."
      - "Responsibility: Implementation of game rules and logic using domain services; the 'Brain' of the app."
    ui:
      - "Role: Performs role of the View in MVC."
      - "Responsibility: Functional pillar for user interaction (Textual/Asciimatics); agnostic of business math."
    core:
      - "Technical Warehouse and Manager: Houses utilities interacting with the OS/FileSystem (DI Container, Asset Loader, Events)."

gateway:
  - "main.py entry point: Initializes the ServiceContainer."
  - "Lifecycle: Orchestrates the two-phase lifecycle (Register -> Boot) via ServiceProviders."

unedited_updates:
  Anemic_Models: 
    - "domain/wagon/model.py domain-value-object of a wagon"
    - "logic for wagon/model.py contained within logic.py - e.g. wagon.fix_axel()"
  