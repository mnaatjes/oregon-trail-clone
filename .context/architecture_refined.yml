project_metadata:
  name: "Oregon Trail"
  remote_repository: "https://github.com/mnaatjes/oregon-trail-clone.git"
  description: "A text-based adventure game where players navigate the challenges of the Oregon Trail."
  version: "0.1.1"
  author: "Michael Naatjes"
  updated_at: 2026-04-14

project_wide_directives:
  - "Circular Imports Prohibited"
  - ""

structural_patterns:
  implementation: "Model View Controller (MVC)"
  attributes:
    - "Will act as a Screaming MVC"
    

organizational_patterns:
  implementation: "Screaming Architecture"
  src_directory_map: 
    domain:
      related_to_MVC:
        - "Acts as the Model in MVC"
        - "Business-rule / Entity name is the top level parent, e.g. domain/health or domain/animal"
        - "Contains Data (models, value objects, blueprints)"
        - "Businessrules and logic"
        - "Orchestration domain-services for how each model-entity performs a task"
        - "Use __init__.py to lift the functions up to the top level; e.g. character.apply_aging()"
      components_within_domain:
        - "Registries manage Blueprints"
        - "Entites contain domain-services"
        - "ServiceProviders provide Entities"
        - "Internal Consistency: Every domain package should internally maintain a consistent structure of models, logic, and exceptions."
        - ""
    engine:
      - "Fulfills role as the Controller in MVC"
    ui:
      - "Performs role of the View in MVC"