architecture_directives:
  pattern: "Screaming MVC"
  description: "MVC serves as the Internal Organization Pattern; Ports & Adapters serves as the Boundary Pattern."

  laws_of_physics:
    - "The Folder is the 'What' (Intent); the File is the 'How' (Role)."
    - "Pillar Boundaries: Domain, UI, and Engine must remain physically and logically separate."
    - "Orthogonal Evolution: UI changes must never necessitate Domain changes."
    - "Boundary Protection: Domain must remain a 'Pure Logic' zone, free of I/O or external noise."

  mvc_mapping:
    model:
      path: "src/domain/"
      responsibility: "Screaming business logic and anemic state."
    view:
      path: "src/ui/"
      responsibility: "Presentation and User Input (Agnostic of business math)."
    controller:
      path: "src/engine/"
      responsibility: "Orchestration, Events, and Game Lifecycle."
    spec:
      path: "src/core/"
      responsibility: "Contracts, Dependency Injection, and Base Classes."

  screaming_implementation:
    facade_pattern: "The __init__.py of each domain package acts as a Facade (The Voice)."
    discovery: "Lifts important Verbs (Services) and Nouns (Models) to the top level."
    encapsulation: "Hides internal logic.py and models.py details from the Engine."
    all_declaration: "Use of __all__ in __init__.py is REQUIRED to contain leaks."
