architectural_governance:
  enforcement_level: "Strict"
  design_pattern: "Universal Domain Blueprint (UDB)"

  flow_constraints:
    - "All functional logic MUST originate from a Domain Package."
    - "Cross-Domain interaction MUST be brokered by the Engine/ServiceContainer."
    - "No Domain Package shall import another Domain Package directly (Zero-Dependency Leaf Policy)."

  component_contracts:
    blueprint:
      contract: "DomainBlueprint (Dataclass)"
      directive: "Immutable template for domain data. Must contain a unique 'slug'."
    provider:
      contract: "BaseServiceProvider (ABC)"
      directive: "Handles domain wiring in two phases: register() for bindings and boot() for cross-service logic."
    registry:
      contract: "BaseRegistry (ABC)"
      directive: "Generic container for DomainBlueprints. Responsible for hydrating domain templates from raw data."
    service:
      contract: "Protocol-based Interface"
      directive: "Must maintain pure domain logic; state changes must be requested via Models."

  structural_typing_policy:
    - "Use 'typing.Protocol' for cross-system interaction (e.g., Infectable, Transportable)."
    - "Prefer 'Static Duck Typing' over inheritance to keep domain packages uncoupled."

  bootstrap_lifecycle:
    sequence:
      Phase 1: "Registration. All ServiceProviders call register() to bind factories and singletons to the ServiceContainer."
      Phase 2: "Bootstrapping. All ServiceProviders call boot() to perform logic requiring other services or asset loading."
    enforcement: "The ServiceContainer ensures that boot() is only called after all providers have completed register()."