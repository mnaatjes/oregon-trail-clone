metadata: 
  id: "Documentation Ruleset"
  purpose: "Defines documentation ruleset in accordance with Diataxis ADR Document."
  scope: "docs/"
  version: "0.1.0"
  created_at: "2026-04-16 03:19:00"
  updated_at: "2026-04-16 03:55:00"
  permissions: "readonly"

documentation_directives:
  framework: "Diátaxis"
  description: "Documentation is organized into four distinct quadrants based on user needs."

  quadrants:
    tutorials:
      path: "docs/tutorials/"
      orientation: "Learning-oriented (Lessons for the beginner)"
    how_to_guides:
      path: "docs/how-to/"
      orientation: "Task-oriented (Steps for the practitioner)"
    explanation:
      path: "docs/explanation/"
      orientation: "Understanding-oriented (Discussions for the co-worker)"
      sub_directories:
        - "docs/explanation/architecture/"
        - "docs/explanation/design/"
        - "docs/explanation/reports/adr/"
        - "docs/explanation/reports/status/"
        - "docs/explanation/terminology/"
    reference:
      path: "docs/reference/"
      orientation: "Information-oriented (Descriptions for the specialist)"

  standard_operating_procedures:
    location: "All documentation must reside in /docs."
    format: "Markdown (.md) using kebab-case naming."
    archiving: "Deprecated documents move to docs/_archive/ with status updated to 'deprecated'."
    enforcement: "Updates required for all architecturally significant changes."
    adr_addenda_workflow:
      - "Atomic Appending: Use 'cat >>' via shell to safely append to the end of the file, avoiding replacement errors."
      - "Historical Integrity: Always use a '## Addendum (YYYY-MM-DD)' header to preserve the original adopted decision."
      - "Contextual Mapping: Ensure clarifications are appended to the specific ADR document most relevant to the rule."
      - "Frontmatter Maintenance: The 'updated_at' field in the ADR's frontmatter MUST be updated to the current timestamp when an addendum is added."
      - "Strict Scoping: Only modify the specific ADR file(s) explicitly referenced in the review or inquiry."

  frontmatter_schema:
    required_keys:
      - "title: Clear, concise heading."
      - "description: One-sentence summary for skim-reading."
      - "type: The Diátaxis quadrant."
      - "status: draft | stable | deprecated."
      - "created_at: YYYY-MM-DD HH:MM:SS."
      - "updated_at: YYYY-MM-DD HH:MM:SS."
      - "owner: Primary maintainer."
      - "tags: Keywords for filtering."
      - "version: Software version described."
